name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build and Test (Linux)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpng-dev

      - name: Run tests
        run: make test

      - name: Print test.log on failure
        if: failure()
        run: |
          if [ -f test/test.log ]; then
            cat test/test.log
          else
            echo "test/test.log not found (tests may have failed to build)"
          fi

      - name: Upload test.log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test/test.log
          if-no-files-found: ignore
