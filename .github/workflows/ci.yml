name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build and Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpng-dev

      - name: Build tests
        run: make -C test

      - name: Run tests
        run: make test

      - name: Print test.log on failure
        if: failure()
        run: cat test/test.log

      - name: Upload test.log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test/test.log
